global:
  scrape_interval: 1s

scrape_configs:
  - job_name: "ovs_fdb"
    static_configs:
      - targets:
          - host.docker.internal:8000
  
  - job_name: "episode_exporter"

    static_configs:
      - targets:
          - host.docker.internal:8001
    
  - job_name: "steps_exporter"
    static_configs:
      - targets:
          - host.docker.internal:8002